<!DOCTYPE html>
<html>
<head>
  <!--
    This placeholder is replaced by the --base-href value during flutter build.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="My Cookbook AI recipe organiser.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="My Cookbook AI">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <title>My Cookbook AI</title>
  <link rel="manifest" href="manifest.json">

  <!-- Browser OCR engine used by the Flutter web app. -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>
  <script>
    window.recognizeRecipeImage = async function (imageDataUrl) {
      if (!window.Tesseract) {
        throw new Error(
          'The text-recognition engine did not load. Check your internet connection and reload the app.'
        );
      }

      const worker = await window.Tesseract.createWorker('eng', 1, {
        logger: function (message) {
          console.log('Recipe OCR:', message.status, message.progress ?? '');
        }
      });

      try {
        const result = await worker.recognize(imageDataUrl);
        return result?.data?.text ?? '';
      } finally {
        await worker.terminate();
      }
    };
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
